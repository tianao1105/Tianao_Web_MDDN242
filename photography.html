<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography – Aokey</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="side-nav" aria-label="Primary">
    <span class="side-nav-logo"><img src="favicon-32x32.png" alt="" /><span>Aokey</span></span>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="photography.html" aria-current="page">Photography</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about/index.html">About</a></li>
    </ul>
    <div class="nav-bottom-group">
      <button id="spawn-coin">
        <img src="images/insert_coins.gif" alt="Spawn coin" />
      </button>
      <button id="game-toggle">▶ PLAY</button>
    </div>
  </nav>

  <header><h1 class="title">Photography</h1></header>

  <main id="main-content">
    <div class="underline" aria-hidden="true" id="underline-el"></div>

    <section class="works" aria-label="摄影作品">
      <div class="works-grid" id="works-grid"></div>
    </section>
    <p style="text-align:center; color: var(--section-color); font-size:13px; opacity:0.55; margin-top:32px; letter-spacing:0.08em;">
      The best photo is always the next one.
    </p>
  </main>

  <footer><small>&copy; <span id="year"></span> Tianao Wang</small></footer>

  <!-- 弹出层 -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 class="modal-title" id="modal-title"></h2>
      <img class="modal-img" id="modal-img" src="" alt="" />
      <p class="modal-desc" id="modal-desc"></p>
    </div>
  </div>

  <!-- 游戏图层 -->
  <canvas id="game-canvas"></canvas>
  <div id="coin-hud"></div>
  <div id="controls-hint">← → MOVE &nbsp;·&nbsp; ↑ JUMP &nbsp;·&nbsp; SPACE(air) FLY &nbsp;·&nbsp; ↓ DROP</div>

  <script src="photography_works.js"></script>
  <script>
    const grid = document.getElementById('works-grid');
    PHOTO_WORKS.forEach(w => {
      grid.insertAdjacentHTML('beforeend', `
        <article class="work-card">
          <a href="#" class="work-media" aria-label="${w.title}"
             data-modal data-title="${w.title}" data-desc="${w.desc}" data-img="${w.img}">
            <img src="${w.thumb}" alt="${w.title}" />
          </a>
        </article>
      `);
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <script src="script.js"></script>
  <script src="shopEffects.js"></script>
  <script src="colorWheel.js"></script>

  <script>
    const overlay    = document.getElementById('modal-overlay');
    const modalImg   = document.getElementById('modal-img');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc  = document.getElementById('modal-desc');

    function openModal(img, title, desc) {
      modalImg.src           = img;
      modalImg.alt           = title;
      modalTitle.textContent = title;
      modalDesc.textContent  = desc;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('[data-modal]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        openModal(el.dataset.img, el.dataset.title, el.dataset.desc);
      });
    });

    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
