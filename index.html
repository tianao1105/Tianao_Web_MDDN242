<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aokey</title>
  <meta name="description" content="A short description of your page goes here.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Side navigation -->
  <nav class="side-nav" aria-label="Primary">
    <span class="side-nav-logo"><img src="favicon-32x32.png" alt="" /><span>Aokey</span></span>
    <ul>
      <li><a href="index.html" aria-current="page">Home</a></li>
      <li><a href="photography.html">Photography</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="game.html">Mini-Game</a></li>
      <li><a href="about/index.html">About</a></li>
    </ul>
    <!-- Bottom group: coin spawn + PLAY -->
    <div class="nav-bottom-group">
      <button id="spawn-coin">
        <img src="images/insert_coins.gif" alt="Spawn coin" />
      </button>
      <button id="game-toggle">▶ PLAY</button>
    </div>
  </nav>


<header><h1 class="title">Aokey(Tianao's works)</h1></header>

  <main id="main-content">
    <div class="underline" aria-hidden="true" id="underline-el"></div>

    <section class="works" aria-label="Works showcase">
   
      <div class="works-grid" id="works-grid"></div>
    </section>

   
  </main>

  <footer><small>&copy; <span id="year"></span> Tianao Wang</small></footer>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 class="modal-title" id="modal-title"></h2>
      <img class="modal-img" id="modal-img" src="" alt="" />
      <p class="modal-desc" id="modal-desc"></p>
    </div>
  </div>

  <!-- Game layer -->
  <canvas id="game-canvas"></canvas>
  <div id="coin-hud"></div>

  <div id="controls-hint">← → MOVE &nbsp;·&nbsp; ↑ JUMP &nbsp;·&nbsp; SPACE(air) FLY &nbsp;·&nbsp; ↓ DROP</div>
  <div id="card-hint"></div>

  <!-- Step 1: load works data -->
  <script src="works.js"></script>

  <!-- Step 2: generate cards -->
  <script>
    const grid = document.getElementById('works-grid');
    WORKS.forEach(w => {
      grid.insertAdjacentHTML('beforeend', `
        <article class="work-card">
          <a href="#" class="work-media" aria-label="${w.title}"
             data-modal data-title="${w.title}" data-desc="${w.desc}" data-img="${w.img}">
            <img src="${w.thumb}" alt="${w.title}" />
          </a>
        </article>
      `);
    });
  </script>

  <!-- Step 3: game scripts -->
  <script src="script.js"></script>
  <script src="shopEffects.js"></script>
  <script src="colorWheel.js"></script>
  <script src="coinHud.js"></script>

  <!-- Step 4: modal events -->
  <script>
    const overlay    = document.getElementById('modal-overlay');
    const modalImg   = document.getElementById('modal-img');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc  = document.getElementById('modal-desc');

    function openModal(img, title, desc) {
      modalImg.src           = img;
      modalImg.alt           = title;
      modalTitle.textContent = title;
      modalDesc.textContent  = desc;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('[data-modal]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        openModal(el.dataset.img, el.dataset.title, el.dataset.desc);
      });
    });

    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

  <script>
    // ── Work card proximity hint ───────────────────
    const cardHintEl = document.getElementById('card-hint');

    function workCardHintLoop() {
      if (!gameActive || overlay.classList.contains('open')) {
        cardHintEl.classList.remove('show');
        requestAnimationFrame(workCardHintLoop);
        return;
      }

      const px = player.docX - window.scrollX + player.w / 2;
      const py = player.docY - window.scrollY + player.h;

      let found = null;
      document.querySelectorAll('.work-media').forEach(el => {
        if (found) return;
        const r = el.getBoundingClientRect();
        if (Math.abs(py - r.top) < 16 && px > r.left - 8 && px < r.right + 8) {
          found = el;
        }
      });

      if (found) {
        const desc = found.dataset.desc || '';
        const r = found.getBoundingClientRect();
        cardHintEl.innerHTML = `<span class="hint-name">${desc}</span>`;
        cardHintEl.style.left = (r.left + r.width / 2) + 'px';
        cardHintEl.style.top  = r.top + 'px';
        cardHintEl.classList.add('show');
      } else {
        cardHintEl.classList.remove('show');
      }

      requestAnimationFrame(workCardHintLoop);
    }
    workCardHintLoop();
  </script>

</body>
</html>
